<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Circuit Crossword Challenge - Grade 12 LS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.2rem;
            position: relative;
        }
        .cell-input {
            width: 100%;
            height: 100%;
            outline: none;
            background: transparent;
            text-align: center;
            caret-color: #3b82f6;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 0.6rem;
            color: #64748b;
            pointer-events: none;
            line-height: 1;
        }
        .cell-blocked {
            background-color: #1e293b;
            border: 1px solid #1e293b;
        }
        .cell-correct {
            background-color: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }
        .clue-item:hover {
            background-color: #f1f5f9;
        }
        [dir="auto"] { unicode-bidi: plaintext; text-align: start; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <!-- LOGIN SECTION -->
    <div id="login-view" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-6">
                <div class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-slate-800">RL Circuit Challenge</h1>
                <p class="text-slate-500 text-sm mt-1">Grade 12 LS Smart-Sheet</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="accessCode" placeholder="Enter Access Code" maxlength="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-center text-2xl tracking-[0.5em] focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all">Start Crossword</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="app-view" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <div class="bg-blue-100 p-2 rounded-lg text-blue-600 font-bold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div dir="auto">
                    <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Student</span>
                    <span id="display-name" class="font-bold text-slate-700">--</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="checkAll()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold">Verify Answers</button>
                <button onclick="submitResults()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg shadow-emerald-900/20">Submit Final</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            <!-- Crossword Grid -->
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 overflow-auto flex justify-center">
                <table id="crossword-grid" class="border-collapse">
                    <!-- Grid generated here -->
                </table>
            </div>

            <!-- Clues -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                    <h3 class="text-blue-600 font-black uppercase text-xs tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 13l-7 7-7-7m14-8l-7 7-7-7"></path></svg>
                        Across
                    </h3>
                    <div id="clues-across" class="space-y-3 text-sm"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                    <h3 class="text-indigo-600 font-black uppercase text-xs tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        Down
                    </h3>
                    <div id="clues-down" class="space-y-3 text-sm"></div>
                </div>

                <div id="feedback" class="p-4 rounded-xl bg-blue-50 border border-blue-100 text-center font-medium text-blue-600">
                    Master the RL terminology! Fill in the grid above.
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            grade: "Grade 12 LS",
            topic: "RL Circuit Crossword",
            url: "https://script.google.com/macros/s/AKfycbxEqjkidMAWs1wrCok-ZVWhMK1TTg-kenzZubCTvkSe_AwBub2Zet9GXpjPSiXXmI6xYw/exec",
            students: {
                "Teacher": "0000",
                "احمد / خالد / درويش": "8156", "احمد / محمود / الشفيق": "1518", 
                "احمد / محمود / صيداوي": "9147", "احمد / محمود / مشحاوي": "7799", 
                "داني / بلال / درغام": "1016", "محمد / خالد / شميسم": "9522", 
                "محمد سالم / هيسم / فيض الله": "1019", "محمد نجيب / احمد / بحري": "3014", 
                "منذر / وليد / مسيكه": "7858", "هادي / عمر / ابراهيم": "8963"
            }
        };

        const crosswordData = {
            gridSize: 12,
            clues: [
                { num: 1, dir: 'across', row: 1, col: 1, answer: 'INDUCTOR', text: 'A component that opposes changes in current.' },
                { num: 4, dir: 'across', row: 3, col: 3, answer: 'HENRY', text: 'The SI unit of inductance.' },
                { num: 6, dir: 'across', row: 5, col: 1, answer: 'COIL', text: 'A common name for an inductor made of wire loops.' },
                { num: 8, dir: 'across', row: 7, col: 5, answer: 'STEADY', text: 'Type of state reached when $t > 5\\tau$.' },
                { num: 2, dir: 'down', row: 1, col: 1, answer: 'IMPEDANCE', text: 'Total opposition to AC current (includes R and L).' },
                { num: 3, dir: 'down', row: 1, col: 5, answer: 'TIME', text: 'The T in the time constant $\\tau$.' },
                { num: 5, dir: 'down', row: 3, col: 8, answer: 'RESISTOR', text: 'The R component in the RL circuit.' },
                { num: 7, dir: 'down', row: 5, col: 3, answer: 'LENZ', text: 'Law stating that induced EMF opposes the change causing it.' }
            ]
        };

        let grid = [];
        let currentUser = "";

        function login() {
            const code = document.getElementById('accessCode').value;
            const student = Object.keys(CONFIG.students).find(k => CONFIG.students[k] === code);
            if (student) {
                currentUser = student;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('display-name').innerText = student;
                initGrid();
            } else {
                Swal.fire('Invalid Code', 'Check your access code and try again.', 'error');
            }
        }

        function initGrid() {
            const size = crosswordData.gridSize;
            const table = document.getElementById('crossword-grid');
            const acrossContainer = document.getElementById('clues-across');
            const downContainer = document.getElementById('clues-down');
            
            // Initialize logical grid
            for (let y = 0; y < size; y++) {
                grid[y] = [];
                for (let x = 0; x < size; x++) {
                    grid[y][x] = { letter: '', num: null, blocked: true, userLetter: '' };
                }
            }

            // Map data to grid
            crosswordData.clues.forEach(clue => {
                let r = clue.row;
                let c = clue.col;
                grid[r][c].num = clue.num;
                
                for (let i = 0; i < clue.answer.length; i++) {
                    let currR = clue.dir === 'across' ? r : r + i;
                    let currC = clue.dir === 'across' ? c + i : c;
                    grid[currR][currC].letter = clue.answer[i];
                    grid[currR][currC].blocked = false;
                }

                // Render Clues
                const clueHtml = `<div class="clue-item p-2 rounded cursor-pointer border-l-2 ${clue.dir === 'across' ? 'border-blue-400' : 'border-indigo-400'}" onclick="focusCell(${r},${c})">
                    <span class="font-bold">${clue.num}.</span> ${clue.text}
                </div>`;
                if (clue.dir === 'across') acrossContainer.innerHTML += clueHtml;
                else downContainer.innerHTML += clueHtml;
            });

            // Render Table
            table.innerHTML = '';
            for (let y = 0; y < size; y++) {
                const tr = document.createElement('tr');
                for (let x = 0; x < size; x++) {
                    const td = document.createElement('td');
                    td.className = grid[y][x].blocked ? 'cell cell-blocked' : 'cell';
                    
                    if (!grid[y][x].blocked) {
                        if (grid[y][x].num) {
                            const num = document.createElement('div');
                            num.className = 'cell-number';
                            num.innerText = grid[y][x].num;
                            td.appendChild(num);
                        }
                        const input = document.createElement('input');
                        input.className = 'cell-input';
                        input.maxLength = 1;
                        input.dataset.x = x;
                        input.dataset.y = y;
                        input.oninput = (e) => handleInput(e, x, y);
                        input.onkeydown = (e) => handleKeys(e, x, y);
                        td.appendChild(input);
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function handleInput(e, x, y) {
            grid[y][x].userLetter = e.target.value.toUpperCase();
            if (e.target.value) moveNext(x, y);
        }

        function handleKeys(e, x, y) {
            if (e.key === 'Backspace' && !e.target.value) movePrev(x, y);
        }

        function moveNext(x, y) {
            const inputs = Array.from(document.querySelectorAll('.cell-input'));
            const idx = inputs.findIndex(i => i.dataset.x == x && i.dataset.y == y);
            if (idx < inputs.length - 1) inputs[idx + 1].focus();
        }

        function movePrev(x, y) {
            const inputs = Array.from(document.querySelectorAll('.cell-input'));
            const idx = inputs.findIndex(i => i.dataset.x == x && i.dataset.y == y);
            if (idx > 0) inputs[idx - 1].focus();
        }

        function focusCell(y, x) {
            const input = document.querySelector(`.cell-input[data-x="${x}"][data-y="${y}"]`);
            if (input) input.focus();
        }

        function checkAll() {
            let countCorrect = 0;
            let totalLetters = 0;
            const inputs = document.querySelectorAll('.cell-input');
            
            inputs.forEach(input => {
                const x = input.dataset.x;
                const y = input.dataset.y;
                totalLetters++;
                if (grid[y][x].userLetter === grid[y][x].letter) {
                    input.parentElement.classList.add('cell-correct');
                    countCorrect++;
                } else {
                    input.parentElement.classList.remove('cell-correct');
                }
            });

            document.getElementById('feedback').innerText = `Progress: ${countCorrect}/${totalLetters} letters correct.`;
            return { countCorrect, totalLetters };
        }

        async function submitResults() {
            const { countCorrect, totalLetters } = checkAll();
            const finalScore = Math.round((countCorrect / totalLetters) * 100);

            Swal.fire({
                title: 'Submit Results?',
                text: `You have completed ${finalScore}% of the crossword. Ready to send to the dashboard?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#059669',
                confirmButtonText: 'Yes, Submit'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Syncing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    const payload = {
                        name: currentUser,
                        score: finalScore,
                        topic: CONFIG.topic,
                        answers: `Crossword completed: ${finalScore}% accuracy.`
                    };

                    try {
                        await fetch(CONFIG.url, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                        Swal.fire('Success!', 'Your data has been recorded.', 'success');
                    } catch (e) {
                        Swal.fire('Network Error', 'Sync failed. Take a screenshot of this page.', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
